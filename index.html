<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源 - 如形の小站"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333;
        }

        /* 左侧侧边栏 */
        .sidebar {
            width: 240px;
            background-color: #f8f9fa;
            border-right: 1px solid #e5e7eb;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 20px;
            font-weight: 600;
            color: #22c55e;
            padding: 0 20px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header::before {
            content: "🌲";
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin: 2px 0;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: #4b5563;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
        }

        .sidebar-menu a:hover {
            background-color: #e5e7eb;
        }

        .sidebar-menu a.active {
            background-color: #dcfce7;
            color: #16a34a;
            border-left: 3px solid #16a34a;
        }

        .sidebar-menu .arrow {
            margin-left: auto;
            font-size: 12px;
        }

        /* 右侧主内容区 */
        .main {
            flex: 1;
            padding: 30px;
        }

        .breadcrumb {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .file-item:hover {
            background-color: #f3f4f6;
            transform: translateY(-2px);
        }

        .file-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .file-name {
            font-size: 13px;
            text-align: center;
            word-break: break-all;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 12px;
            color: #9ca3af;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 左侧侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">如影随形</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="active">📁 根目录</a></li>
            <li><a href="/font">📁 font <span class="arrow">›</span></a></li>
            <li><a href="/css">📁 css <span class="arrow">›</span></a></li>
            <li><a href="/icon">📁 icon <span class="arrow">›</span></a></li>
            <!-- <li><a href="#">📁 其他目录 <span class="arrow">›</span></a></li> -->
        </ul>
        <footer>©2026 Built with ❤️</footer>
    </aside>

    <!-- 右侧主内容区 -->
    <main class="main">
        <div class="breadcrumb">当前位置：根目录</div>
        <div class="file-grid">
            <a href="/font" class="file-item">
                <div class="file-icon">📁</div>
                <div class="file-name">font</div>
            </a>
            <a href="/css" class="file-item">
                <div class="file-icon">📁</div>
                <div class="file-name">css</div>
            </a>
            <a href="/icon" class="file-item">
                <div class="file-icon">📁</div>
                <div class="file-name">icon</div>
            </a>
            <a href="/intro.txt" class="file-item">
                <div class="file-icon">📄</div>
                <div class="file-name">介绍</div>
            </a>
            <a href="/favicon.ico" class="file-item">
                <div class="file-icon">🖼️</div>
                <div class="file-name">头像</div>
            </a>
        </div>
    </main>
</body>
</html>
